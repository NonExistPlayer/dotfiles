##
## Useful
##

windowrule = match:title Picture-in-Picture, float 1, pin 1
windowrule = match:class kitty, float 1, size 1489 785, center 1

##
## Random programs
##
windowrule = match:class qemu, float 1
windowrule = match:class vlc, float 1
# Making steam windows (like settings, friends) center and float
windowrule {
  name = steam

  match:class = steam
  match:title = negative:Steam  # Exclude main window
  match:title = negative:       # Exclude tooltips

  float = 1
  center = 1
}
